{% extends "index.html" %}
{% block content %}

<section id="feature">
  <div class="title-text">
    <p>PREDICTION RESULTS</p>
    <h1>Your Recommendation</h1>
  </div>
  
  <div style="width: 80%; margin: auto; text-align: center; padding: 50px 20px;">
    <div style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); padding: 50px; border-radius: 15px; box-shadow: 0 6px 20px rgba(0,0,0,0.15);">
      <h2 style="color: #fff; margin-bottom: 20px; font-size: 28px;">Recommended Result</h2>
      <h1 style="color: #fff; font-size: 48px; font-weight: bold; margin: 30px 0;">{{ result|title }}</h1>
      <p style="color: #fff; font-size: 18px; opacity: 0.9;">Based on your soil and environmental data analysis</p>
    </div>
    
    <div style="margin-top: 40px;">
      <a href="/" class="btn btn-success" style="padding: 15px 40px; font-size: 18px; margin: 10px; border-radius: 30px;">Back Home</a>
      <a href="/crop-recommendation" class="btn btn-primary" style="padding: 15px 40px; font-size: 18px; margin: 10px; border-radius: 30px;">Try Again</a>
    </div>
  </div>
</section>

{% endblock %}
